# Production profile — activate with SPRING_PROFILES_ACTIVE=prod.
# Nothing here defaults to a dev-friendly value; a missing env var fails startup loudly
# instead of silently falling back to something wrong in production.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Schema is expected to already match the entities — Hibernate verifies, it does not alter.
# NOTE: the schema must exist before first boot under this profile (either run once with
# ddl-auto=update against the prod DB to bootstrap it, or introduce real migrations).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Railway/Render inject PORT at runtime; default only matters for local "prod-like" testing
server.port=${PORT:8080}

groq.api.key=${GROQ_API_KEY}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}

# No localhost fallback — the deployed frontend's real origin must be set explicitly
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:10}
app.rate-limit.refill-minutes=${RATE_LIMIT_REFILL_MINUTES:1}
