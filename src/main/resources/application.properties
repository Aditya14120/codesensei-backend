spring.datasource.url=jdbc:postgresql://localhost:5432/codesensei
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Spring Boot Default Port
server.port=8080
groq.api.key=${GROQ_API_KEY}

# JWT signing secret (HS256, 384-bit) and token lifetime in ms (24h)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Comma-separated list of origins allowed to call this API (see CorsConfig)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
