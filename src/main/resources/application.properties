spring.datasource.url=jdbc:postgresql://localhost:5432/codesensei
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Spring Boot Default Port
server.port=8080
groq.api.key=${GROQ_API_KEY}

# JWT signing secret (HS256, 384-bit) and token lifetime in ms (2h — short-lived since a stolen
# token is otherwise valid until it naturally expires; see JwtAuthFilter/AuthService.logout for
# the server-side revocation that covers the rest of that window)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}

# Comma-separated list of origins allowed to call this API (see CorsConfig)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Per-user request limit on /api/code/analyze and /api/code/translate (see RateLimitFilter)
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:10}
app.rate-limit.refill-minutes=${RATE_LIMIT_REFILL_MINUTES:1}
