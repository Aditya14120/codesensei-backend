name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # The test profile (src/test/resources/application.properties) points at an in-memory
      # H2 database and uses placeholder secrets, so this needs no repository secrets to run.
      - name: Build and test
        run: mvn -B clean verify
